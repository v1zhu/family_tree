<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Family Tree</h1>
    <button id="addPersonBtn">Add Person</button>
    <button id="clearTreeBtn">Clear Tree</button>

    <div id="treeContainer"></div>

    <!-- Info panel -->
    <div id="infoPanel" class="hidden">
      <h2>Edit Person</h2>
      <label>Name: <input type="text" id="personName" /></label><br />
      <label>Birthplace: <input type="text" id="personBirthplace" /></label
      ><br />
      <label
        >Stories:<br />
        <textarea id="personStories"></textarea></label
      ><br />
      <label
        >Link to Person ID: <input type="number" id="relationTargetId" /></label
      ><br />
      <label
        >Relationship Type:
        <select id="relationType">
          <option value="parent">Parent</option>
          <option value="child">Child</option>
          <option value="spouse">Spouse</option>
          <option value="sibling">Sibling</option>
        </select> </label
      ><br />
      <button id="addRelationBtn">Add Relationship</button>
      <button id="deleteRelationBtn">Delete Relationship</button>
      <button id="savePersonBtn">Save</button>
      <button id="closePanelBtn">Close</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
